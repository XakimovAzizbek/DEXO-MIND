<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DEXO MIND</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <div class="app">

    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">DX</span>
        <div class="brand-text">
          <h1>DEXO MIND</h1>
          <p id="status-line">DEXO MIND yuklanmoqda...</p>
        </div>
      </div>
    </header>

    <main class="chat-window" id="chat-window">
      <!-- Xabarlar shu yerga avtomatik qo'shiladi -->
    </main>

    <!-- Biriktirilgan fayl/rasm preview shu yerda chiqadi -->
    <div class="attachment-preview" id="attachment-preview"></div>

    <form class="input-bar" id="input-form">
      <input type="file" id="image-input" accept="image/*" hidden />
      <input type="file" id="file-input" accept=".txt,.md,.csv,.json,.js,.html,.css" hidden />

      <button type="button" class="attach-btn" id="image-btn" aria-label="Rasm biriktirish" title="Rasm biriktirish">
        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="18" height="18" rx="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button type="button" class="attach-btn" id="file-btn" aria-label="Fayl biriktirish" title="Fayl biriktirish">
        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21.44 11.05 12.25 20.24a5.5 5.5 0 0 1-7.78-7.78l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95l-9.2 9.19a1.5 1.5 0 0 1-2.12-2.12l8.49-8.48" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <input
        type="text"
        id="user-input"
        placeholder="Xabar yozing..."
        autocomplete="off"
      />
      <button type="submit" id="send-btn" aria-label="Yuborish">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2 11 13" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2 15 22 11 13 2 9 22 2Z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>

  </div>

  <script src="index.js"></script>
</body>
</html>
